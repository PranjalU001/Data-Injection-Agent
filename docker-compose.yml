version: '3'

services:

  flask:
    build:
      context: .
      dockerfile: docker/Dockerfile.flask
    ports:
      - "5000:5000"

  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "8501:8501"